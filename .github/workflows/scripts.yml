# Checks scripts.
name: scripts
on:
  pull_request:
  push:
permissions: read-all
jobs:
  run_scripts_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install git+https://github.com/joachimmetz/py-leveldb.git@0.202
    - name: Generate test data
      run: |
        python generate-specimens.py
    - uses: actions/upload-artifact@v7
      with:
        name: specimens-linux
        path: specimens/*
